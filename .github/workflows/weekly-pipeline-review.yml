name: Weekly Pipeline Self-Review

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 09:00 UTC
  workflow_dispatch:        # manual trigger for testing

jobs:
  pipeline-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "feedback-agent[bot]"
          git config --global user.email "feedback-agent@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r feedback_agent/requirements.txt

      - name: Run pipeline review
        id: review
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CI: "true"
        run: |
          python - <<'EOF'
          import sys, os, json
          from pathlib import Path
          sys.path.insert(0, str(Path('.').resolve()))
          from dotenv import load_dotenv
          load_dotenv('backend/.env')
          from feedback_agent.db import get_conn
          from feedback_agent.pipeline_reviewer import review_and_improve

          conn = get_conn()
          try:
              result = review_and_improve(conn)
              print(f"IMPROVEMENTS_NEEDED={result.get('improvements_needed', False)}")
              print(f"SUMMARY={result.get('summary', 'no changes')}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"improvements_needed={str(result.get('improvements_needed', False)).lower()}\n")
                  f.write(f"summary={result.get('summary', 'no changes')}\n")
          finally:
              conn.close()
          EOF

      - name: Commit and open PR if improvements found
        if: steps.review.outputs.improvements_needed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          BRANCH="pipeline-review/${TODAY}"
          git checkout -b "$BRANCH"
          git add feedback_agent/prompts/
          git diff --staged --quiet || git commit -m "[pipeline-review] Improve prompts — ${TODAY}

          ${{ steps.review.outputs.summary }}

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
          git push origin "$BRANCH"
          gh pr create \
            --title "[pipeline-review] ${{ steps.review.outputs.summary }}" \
            --body "## Weekly Pipeline Self-Review

          This PR was generated by the weekly pipeline review process.

          ### What changed
          ${{ steps.review.outputs.summary }}

          ### Why
          Claude analysed the last 7 pipeline runs and identified prompt improvements.

          🤖 Generated with [Claude Code](https://claude.com/claude-code)" \
            --base main \
            --head "$BRANCH"
