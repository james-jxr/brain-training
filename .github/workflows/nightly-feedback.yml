name: Nightly Feedback Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC nightly
  workflow_dispatch:        # manual trigger for testing

jobs:
  feedback-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push branch + commit spec/run-log + monitor auto-fix
      pull-requests: write   # open PR
      issues: write          # create issues for non-implementable items + escalations

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history needed for spec diff
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "feedback-agent[bot]"
          git config --global user.email "feedback-agent@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install feedback agent dependencies
        run: pip install -r feedback_agent/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run feedback pipeline
        id: pipeline
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 2
          retry_wait_seconds: 30
          command: python feedback_agent/pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CI: "true"

      - name: Pipeline failure recovery
        if: failure() && steps.pipeline.conclusion == 'failure'
        run: python feedback_agent/pipeline_monitor.py --run-id ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-failure-${{ github.run_id }}
          path: run-log.md
